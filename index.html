<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Curadoria de alta sofisticação para celebrar os maiores momentos da vida. Encontre o kit presenteável perfeito para o Dia dos Namorados e outras datas especiais com frete expresso para todo o Brasil." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://amour.com.br/" />
    <meta property="og:title" content="Amour & Co. | Presentes de Luxo & Kits Premium" />
    <meta property="og:description" content="Curadoria de alta sofisticação para celebrar os maiores momentos da vida. Encontre o kit presenteável perfeito com frete expresso para todo o Brasil." />
    <meta property="og:image" content="/images/kit-namorados.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Amour & Co. | Presentes de Luxo & Kits Premium" />
    <meta property="twitter:description" content="Curadoria de alta sofisticação para celebrar os maiores momentos da vida. Encontre o kit presenteável perfeito." />
    <meta property="twitter:image" content="/images/kit-namorados.png" />

    <!-- Schema.org Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Amour & Co. Presentes de Luxo",
        "image": "https://amour.com.br/images/kit-namorados.png",
        "description": "Loja premium especializada na venda de kits presenteáveis para datas comemorativas.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Alameda Lorena, 1500",
          "addressLocality": "São Paulo",
          "addressRegion": "SP",
          "postalCode": "01424-002",
          "addressCountry": "BR"
        },
        "telephone": "0800-500-7000"
      }
    </script>

    <title>Amour & Co. | Presentes de Luxo & Kits Premium</title>
    
    <!-- Anti-flash script for Theme -->
    <script>
      (function() {
        try {
          // Default logic: dark is the default. Only check if 'theme-preference' is light
          // Wait, actually the storefront settings are in 'amr_store_config' or something?
          // Let's just check localStorage for 'amr_theme' = 'light'
          var theme = localStorage.getItem('amr_theme');
          var systemLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          if (theme === 'light' || (theme === 'system' && systemLight)) {
            document.documentElement.classList.add('light-mode');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-luxury-black text-gray-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
